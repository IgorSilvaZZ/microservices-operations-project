name: Operations Project workflow

on:
    push:
        paths: 
            - 'ms-auth/**'
            - 'ms-orders/**'
            - 'api-gateway/**'
            - 'packages/**'
            - 'yarn.lock'
            - 'package.json'

    pull_request:
        paths: 
            - 'ms-auth/**'
            - 'ms-orders/**'
            - 'api-gateway/**'
            - 'packages/**'
            - 'yarn.lock'
            - 'package.json'

    workflow_dispatch:

jobs:
    lint-ms-auth:
        uses: ./.github/workflows/ms-auth-lint.yml

    lint-ms-orders:
        uses: ./.github/workflows/ms-orders-lint.yml

    tests-ms-auth:
        name: Run Unit Tests Ms-Auth
        runs-on: ubuntu-latest
        needs: lint-ms-auth

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 22
                cache: 'yarn'
                cache-dependency-path: yarn.lock

            - run: yarn install --frozen-lockfile
            
            - run: yarn auth:test

    tests-ms-orders:
        name: Run Unit Tests Ms-Orders
        runs-on: ubuntu-latest
        needs: lint-ms-orders

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 22
                cache: 'yarn'
                cache-dependency-path: yarn.lock

            - run: yarn install --frozen-lockfile
            
            - run: yarn orders:test
